<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Channel ID Finder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="ambient-bg"></div>
    <div class="app-container">
      <header class="header">
        <h1>YouTube Channel ID Finder</h1>
        <p class="subtitle">Extract the channel ID quickly with a beautiful UI</p>
      </header>
      
      <main class="main-content glass-panel">
        <form id="finder-form">
          <div class="input-group">
            <label for="youtube-url">YouTube Video URL</label>
            <input 
              type="url" 
              id="youtube-url" 
              placeholder="https://www.youtube.com/watch?v=..." 
              required
            />
          </div>
          
          <button type="submit" id="submit-btn" class="primary-btn">
            <span class="btn-text">Find Channel ID</span>
            <div class="spinner hidden" id="loading-spinner"></div>
          </button>
        </form>

        <div id="result-container" class="result hidden">
          <div class="result-box">
            <p class="result-label">Channel Name</p>
            <h2 id="channel-name" class="result-value heading-gradient">-</h2>
          </div>
          <div class="result-box">
            <p class="result-label">Channel ID</p>
            <div class="copy-group">
              <code id="channel-id" class="result-code">-</code>
              <button id="copy-btn" class="icon-btn" title="Copy to clipboard">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                  <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
              </button>
            </div>
          </div>
        </div>

        <div id="error-container" class="error-msg hidden">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
          <span id="error-text">An error occurred.</span>
        </div>
      </main>

      <div class="settings-panel glass-panel">
        <h3>Settings</h3>
        <p class="settings-desc">Enter your YouTube Data API Key to enable functionality. This is saved securely in your browser's local storage.</p>
        <div class="input-group">
          <input 
            type="password" 
            id="api-key" 
            placeholder="AIzaSy..." 
          />
        </div>
        <button id="save-key-btn" class="secondary-btn">Save API Key</button>
        <span id="key-saved-msg" class="success-msg hidden">Saved!</span>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
